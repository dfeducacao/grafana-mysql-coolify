global:
  scrape_interval: 15s

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: mysql
    static_configs:
      - targets: ["mysqld_exporter:9104"]

  - job_name: node
    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

## SERVER ULTRON START
  - job_name: "server-y"
    static_configs:
      - targets: ["143.244.163.25:9100"]
## SERVER ULTRON END
